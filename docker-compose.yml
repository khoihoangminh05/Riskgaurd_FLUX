version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: riskguard_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: riskguard
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
